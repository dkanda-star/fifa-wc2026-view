<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A0E1A;
    --navy-mid: #141E2E;
    --navy-light: #1F2E40;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #7A6128;
    --green-bright: #2ECC71;
    --white: #FFFFFF;
    --gray: #A8B4C0;
    --gray-light: #D8E0E8;
    --red: #E63946;
    --border: rgba(201,168,76,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    text-align: center;
  }
  .header-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 1px;
    line-height: 1;
  }
  .header-title span { color: var(--gold); }

  .page { padding: 0 0 40px; }

  .section { padding: 20px 16px 0; }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .dist-tab-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .dist-tab {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    background: var(--navy-light);
    border: 1px solid var(--border);
    color: var(--gray-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dist-tab.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* MATCH LIST */
  .match-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .match-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .match-date { font-size: 14px; color: var(--gray-light); font-weight: 500; }
  .match-broadcaster {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .bc-nhk { background: rgba(0,100,50,0.3); color: #4ADE80; border: 1px solid rgba(74,222,128,0.3); }
  .bc-ntv { background: rgba(200,80,0,0.3); color: #FDA07A; border: 1px solid rgba(253,160,122,0.3); }
  .bc-fuji { background: rgba(180,0,80,0.3); color: #F9A8D4; border: 1px solid rgba(249,168,212,0.3); }
  .bc-dazn { background: rgba(0,80,200,0.3); color: #93C5FD; border: 1px solid rgba(147,197,253,0.3); }
  .match-teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .match-team { flex: 1; text-align: center; }
  .match-team-name { font-size: 16px; font-weight: 700; color: var(--white); line-height: 1.3; }
  .match-score-wrap { text-align: center; flex: 0 0 auto; min-width: 60px; }
  .match-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--white);
    line-height: 1;
  }
  .match-score.future { color: var(--gray); font-size: 18px; }
  .match-phase { font-size: 10px; color: var(--gray); margin-top: 2px; text-align: center; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* VIEW TOGGLE */
  .view-toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .view-toggle-btn {
    flex: 1;
    padding: 9px 10px;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--navy-light);
    border: 1px solid var(--border);
    color: var(--gray-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .view-toggle-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* BRACKET CARD */
  .bracket-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .bracket-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .bracket-id { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--gray); }
  .bracket-date { font-size: 12px; color: var(--gray-light); margin-left: 6px; }
  .bracket-teams {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bracket-team {
    flex: 1;
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-light);
    text-align: center;
    padding: 10px 6px;
    border-radius: 8px;
    background: var(--navy-light);
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .bracket-team.winner {
    color: var(--gold-light);
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
  }
  .bracket-team.loser {
    color: var(--gray);
    opacity: 0.55;
  }
  .bracket-score {
    flex: 0 0 auto;
    text-align: center;
    min-width: 64px;
  }
  .bracket-score-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--white);
  }
  .bracket-score-val.future {
    font-size: 16px;
    color: var(--gray);
  }
  .bracket-flow {
    font-size: 11px;
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    margin: 10px 0;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .bracket-card > .bracket-flow:first-child { margin-top: 0; margin-bottom: 14px; }

  /* BRACKET PAIR（上下2試合の勝者が次の試合にまとまる表示） */
  .bracket-pair {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-bottom: 20px;
  }
  .bracket-pair-cards {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
    border-right: 3px solid var(--gold-dim);
    padding-right: 14px;
    margin-right: 14px;
  }
  .bracket-pair-cards .bracket-card { margin-bottom: 0; }
  .bracket-pair-next {
    flex: 0 0 62px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .bracket-pair-arrow { color: var(--gold); font-size: 18px; line-height: 1; margin-bottom: 2px; }
  .bracket-pair-next-id {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1.2;
  }
  .bracket-pair-next-phase { font-size: 10px; color: var(--gray); line-height: 1.2; }

  @keyframes loadbar { 0%{background-position:-200px 0} 100%{background-position:200px 0} }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--red);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>

</div>
