<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A0E1A;
    --navy-mid: #141E2E;
    --navy-light: #1F2E40;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #7A6128;
    --green-bright: #2ECC71;
    --white: #FFFFFF;
    --gray: #A8B4C0;
    --gray-light: #D8E0E8;
    --red: #E63946;
    --border: rgba(201,168,76,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    text-align: center;
  }
  .header-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 1px;
    line-height: 1;
  }
  .header-title span { color: var(--gold); }

  .page { padding: 0 0 40px; }

  .section { padding: 20px 16px 0; }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .dist-tab-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .dist-tab {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    background: var(--navy-light);
    border: 1px solid var(--border);
    color: var(--gray-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dist-tab.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* MATCH LIST */
  .match-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .match-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .match-date { font-size: 14px; color: var(--gray-light); font-weight: 500; }
  .match-broadcaster {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .bc-nhk { background: rgba(0,100,50,0.3); color: #4ADE80; border: 1px solid rgba(74,222,128,0.3); }
  .bc-ntv { background: rgba(200,80,0,0.3); color: #FDA07A; border: 1px solid rgba(253,160,122,0.3); }
  .bc-fuji { background: rgba(180,0,80,0.3); color: #F9A8D4; border: 1px solid rgba(249,168,212,0.3); }
  .bc-dazn { background: rgba(0,80,200,0.3); color: #93C5FD; border: 1px solid rgba(147,197,253,0.3); }
  .match-teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .match-team { flex: 1; text-align: center; }
  .match-team-name { font-size: 16px; font-weight: 700; color: var(--white); line-height: 1.3; }
  .match-score-wrap { text-align: center; flex: 0 0 auto; min-width: 60px; }
  .match-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--white);
    line-height: 1;
  }
  .match-score.future { color: var(--gray); font-size: 18px; }
  .match-phase { font-size: 10px; color: var(--gray); margin-top: 2px; text-align: center; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* VIEW TOGGLE */
  .view-toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .view-toggle-btn {
    flex: 1;
    padding: 9px 10px;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--navy-light);
    border: 1px solid var(--border);
    color: var(--gray-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .view-toggle-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* BRACKET CARD */
  .bracket-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .bracket-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .bracket-id { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--gray); }
  .bracket-date { font-size: 12px; color: var(--gray-light); margin-left: 6px; }
  .bracket-teams {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bracket-team {
    flex: 1;
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-light);
    text-align: center;
    padding: 10px 6px;
    border-radius: 8px;
    background: var(--navy-light);
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .bracket-team.winner {
    color: var(--gold-light);
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
  }
  .bracket-team.loser {
    color: var(--gray);
    opacity: 0.55;
  }
  .bracket-score {
    flex: 0 0 auto;
    text-align: center;
    min-width: 64px;
  }
  .bracket-score-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--white);
  }
  .bracket-score-val.future {
    font-size: 16px;
    color: var(--gray);
  }
  .bracket-flow {
    font-size: 11px;
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    margin: 10px 0;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .bracket-card > .bracket-flow:first-child { margin-top: 0; margin-bottom: 14px; }

  /* BRACKET PAIR（上下2試合の勝者が次の試合にまとまる表示） */
  .bracket-pair {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-bottom: 20px;
  }
  .bracket-pair-cards {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
    border-right: 3px solid var(--gold-dim);
    padding-right: 14px;
    margin-right: 14px;
  }
  .bracket-pair-cards .bracket-card { margin-bottom: 0; }
  .bracket-pair-next {
    flex: 0 0 62px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .bracket-pair-arrow { color: var(--gold); font-size: 18px; line-height: 1; margin-bottom: 2px; }
  .bracket-pair-next-id {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1.2;
  }
  .bracket-pair-next-phase { font-size: 10px; color: var(--gray); line-height: 1.2; }

  @keyframes loadbar { 0%{background-position:-200px 0} 100%{background-position:200px 0} }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--red);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>

</div>

// ====================================================
// GAS API データレイヤー（元コミュニティと同じGAS・スプレッドシートを共用）
// ====================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxnlVsCJbt5h2QURK8Ah6bNQxsy6PXRpfd470IgOTxpRNt-pE_aKUIaS7NXde6D_enLMw/exec';

let _cache = null;

function gasJsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = '_gasCb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const script = document.createElement('script');

    const cleanup = () => {
      if (window[cbName]) delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウト'));
    }, 20000);

    window[cbName] = (data) => {
      clearTimeout(timeout);
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      clearTimeout(timeout);
      cleanup();
      reject(new Error('スクリプト読み込みエラー'));
    };

    params.callback = cbName;
    const qs = new URLSearchParams(params).toString();
    script.src = `${GAS_URL}?${qs}`;
    document.body.appendChild(script);
  });
}

async function gasGet() {
  if (_cache) return _cache;
  showLoading(true);
  try {
    const data = await gasJsonp({ action: 'getAll' });
    _cache = data;
    return data;
  } catch(e) {
    console.error('[GAS] getAll エラー:', e);
    showToast('通信エラー。再読み込みしてください', true);
    return { entries: [], scores: [], teams: [], settings: [], results: [] };
  } finally {
    showLoading(false);
  }
}

function showLoading(show) {
  const el = document.getElementById('loading-bar');
  if (el) el.style.display = show ? 'block' : 'none';
}

function getMatches() {
  const scores = Object.fromEntries((_cache?.scores || []).map(r => [String(r.id), { score: r.score, youtube: r.youtube || '' }]));
  const teams  = Object.fromEntries((_cache?.teams  || []).map(r => [String(r.id), { t1: r.t1, t2: r.t2 }]));
  return MATCHES_MASTER.map(m => ({
    ...m,
    score:   scores[String(m.id)]?.score   ?? m.score,
    youtube: scores[String(m.id)]?.youtube || m.youtube || '',
    t1: teams[String(m.id)]?.t1 ?? m.t1,
    t2: teams[String(m.id)]?.t2 ?? m.t2,
  }));
}

let currentMatchPhase = 'QF';
let currentViewMode = 'list';
const KO_PHASES = ['R32','R16','QF','SF','F'];

// スコア文字列から勝者チーム名を判定（PK・延長対応）
function getWinnerFromScore(score, t1, t2) {
  if (!score) return null;
  const pkMatch = score.match(/^(\d+)-(\d+)\(PK(\d+)-(\d+)\)$/);
  const normalMatch = score.match(/^(\d+)-(\d+)/);
  let g1, g2, pk1 = 0, pk2 = 0;
  if (pkMatch) {
    g1 = +pkMatch[1]; g2 = +pkMatch[2]; pk1 = +pkMatch[3]; pk2 = +pkMatch[4];
  } else if (normalMatch) {
    g1 = +normalMatch[1]; g2 = +normalMatch[2];
  } else return null;

  if (g1 > g2) return t1;
  if (g2 > g1) return t2;
  if (pk1 > pk2) return t1;
  if (pk2 > pk1) return t2;
  return null;
}

async function renderMatches() {
  if (!_cache) await gasGet();
  const el = document.getElementById('matches-list');
  const matches = getMatches();

  const phaseMap = {
    'GL': m => m.phase.startsWith('GL'),
    'R32': m => m.phase === 'ラウンド32',
    'R16': m => m.phase === 'ラウンド16',
    'QF': m => m.phase === '準々決勝',
    'SF': m => m.phase === '準決勝',
    'F': m => m.phase === '3位決定戦' || m.phase === '決勝',
  };
  const filtered = matches.filter(phaseMap[currentMatchPhase] || (() => true));

  // トグルボタンの表示切替（グループステージはリストのみ）
  const toggleRow = document.getElementById('view-toggle-row');
  const isKO = KO_PHASES.includes(currentMatchPhase);
  toggleRow.style.display = isKO ? 'flex' : 'none';
  if (!isKO) currentViewMode = 'list';

  if (isKO && currentViewMode === 'bracket') {
    const order = BRACKET_ORDER[currentMatchPhase];
    const ordered = order
      ? order.map(id => matches.find(m => m.id === id)).filter(Boolean)
      : filtered;
    const pairable = PAIRABLE_PHASES.includes(currentMatchPhase);

    if (pairable) {
      let html = '';
      for (let i = 0; i < ordered.length; i += 2) {
        html += renderBracketPair(ordered[i], ordered[i + 1]);
      }
      el.innerHTML = html || '<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">試合なし</div></div>';
    } else {
      el.innerHTML = ordered.map(m => renderBracketCard(m)).join('') ||
        '<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">試合なし</div></div>';
    }
    return;
  }

  const grouped = {};
  filtered.forEach(m => {
    const dateKey = m.date.split(' ')[0];
    if (!grouped[dateKey]) grouped[dateKey] = [];
    grouped[dateKey].push(m);
  });

  let html = '';
  Object.entries(grouped).forEach(([dateKey, ms]) => {
    if (currentMatchPhase === 'GL') {
      html += `<div style="font-family:'Barlow Condensed';font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;padding:8px 0 4px;margin-top:4px">${dateKey}</div>`;
    }
    ms.forEach(m => {
      const isFinished = m.score !== null;
      const isJapan = m.japan;

      html += `
        <div class="match-card" style="${isJapan ? 'border-color:rgba(255,255,255,0.4);background:rgba(201,168,76,0.06)' : ''}">
          <div class="match-meta">
            <div class="match-date">
              <span style="font-family:'Barlow Condensed';font-size:13px;color:var(--gray);margin-right:5px">#${m.id}</span>📅 ${m.date}${isJapan ? ' <span style="color:var(--gold);font-weight:700">🇯🇵</span>' : ''}
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              ${m.group ? `<span style="font-family:'Barlow Condensed';font-size:14px;font-weight:700;color:var(--navy);background:var(--gold);padding:2px 8px;border-radius:4px">${m.group}組</span>` : ''}
              ${isFinished ? '<span style="font-size:13px;color:var(--green-bright);font-weight:700">終了</span>' : ''}
              <div class="match-broadcaster ${m.bcClass}">${m.bc}</div>
            </div>
          </div>
          <div class="match-teams">
            <div class="match-team">
              <div class="match-team-name">${m.t1}</div>
            </div>
            <div class="match-score-wrap">
              ${isFinished
                ? `<div class="match-score">${m.score}</div>`
                : `<div class="match-score future">VS</div>`
              }
              <div class="match-phase">${m.phase}</div>
            </div>
            <div class="match-team">
              <div class="match-team-name">${m.t2}</div>
            </div>
          </div>
          ${m.youtube
            ? `<a href="${m.youtube}" target="_blank" rel="noopener" style="display:block;margin-top:10px;text-align:center;background:rgba(255,0,0,0.15);border:1px solid rgba(255,80,80,0.4);border-radius:8px;padding:7px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#FF8080;text-decoration:none;letter-spacing:0.5px">▶ ハイライトを見る</a>`
            : ''
          }
        </div>
      `;
    });
  });

  el.innerHTML = html || '<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-text">試合なし</div></div>';
}

const FEED_MAP = {

const PHASE_SHORT = {
  'ラウンド32':'R32', 'ラウンド16':'R16', '準々決勝':'準々決',
  '準決勝':'準決', '3位決定戦':'3位決定戦', '決勝':'決勝',
};

// トーナメント表示専用：日時順ではなく「勝者が同じ次の試合に進む」組み合わせ順
const BRACKET_ORDER = {
  R32: [73,76,75,78,83,84,81,82,74,77,79,80,87,86,85,88],
  R16: [89,90,93,94,91,92,95,96],
  QF:  [97,98,99,100],
  SF:  [101,102],
  F:   [104,103],
};
// 2試合の勝者が1つの試合にまとまる（ペア表示できる）フェーズ
const PAIRABLE_PHASES = ['R32','R16','QF','SF'];

// ペアカード1組を「上下2試合 → まとめて次の試合へ」の形で描画
function renderBracketPair(m1, m2) {
  if (!m1) return '';
  if (!m2) return renderBracketCard(m1); // 奇数余りの保険

  const adv = ADVANCE_MAP[m1.id]; // ペア内の2試合は必ず同じ進出先
  const nextMatch = adv ? MATCHES_MASTER.find(x => x.id === adv.nextId) : null;
  const nextLabel = nextMatch ? (PHASE_SHORT[nextMatch.phase] || nextMatch.phase) : '';

  let nextHtml = '';
  if (adv && adv.loserNextId) {
    // 準決勝ペア：勝者→決勝／敗者→3位決定戦の両方を表示
    const loserMatch = MATCHES_MASTER.find(x => x.id === adv.loserNextId);
    const loserLabel = loserMatch ? (PHASE_SHORT[loserMatch.phase] || loserMatch.phase) : '';
    nextHtml = `
      <div class="bracket-pair-arrow">▶</div>
      <div class="bracket-pair-next-id">🏆 #${adv.nextId}</div>
      <div class="bracket-pair-next-phase">${nextLabel}</div>
      <div class="bracket-pair-next-id" style="margin-top:8px">🥉 #${adv.loserNextId}</div>
      <div class="bracket-pair-next-phase">${loserLabel}</div>
    `;
  } else if (adv) {
    nextHtml = `
      <div class="bracket-pair-arrow">▶</div>
      <div class="bracket-pair-next-id">#${adv.nextId}</div>
      <div class="bracket-pair-next-phase">${nextLabel}</div>
    `;
  }

  return `
    <div class="bracket-pair">
      <div class="bracket-pair-cards">
        ${renderBracketCard(m1, true)}
        ${renderBracketCard(m2, true)}
      </div>
      <div class="bracket-pair-next">
        ${nextHtml}
      </div>
    </div>
  `;
}

function renderBracketCard(m, inPair) {
  const isFinished = m.score !== null;
  const winner = isFinished ? getWinnerFromScore(m.score, m.t1, m.t2) : null;
  const t1Cls = winner ? (winner === m.t1 ? 'winner' : 'loser') : '';
  const t2Cls = winner ? (winner === m.t2 ? 'winner' : 'loser') : '';

  // 進出元（この試合が誰と誰の勝者同士の対戦か）
  const feeders = FEED_MAP[m.id];
  let feedHtml = '';
  if (feeders) {
    const label = m.id === 103 ? '敗者同士' : '勝者同士';
    feedHtml = `<div class="bracket-flow">🔽 #${feeders[0]} と #${feeders[1]} の${label}</div>`;
  }

  // 進出先（ペア表示中は右側にまとめて出すのでカード内には出さない）
  let advHtml = '';
  if (!inPair) {
    const adv = ADVANCE_MAP[m.id];
    if (adv) {
      const nextMatch = MATCHES_MASTER.find(x => x.id === adv.nextId);
      const nextLabel = nextMatch ? (PHASE_SHORT[nextMatch.phase] || nextMatch.phase) : '';
      let text = `🔼 勝者 → #${adv.nextId}（${nextLabel}）`;
      if (adv.loserNextId) {
        const loserMatch = MATCHES_MASTER.find(x => x.id === adv.loserNextId);
        const loserLabel = loserMatch ? (PHASE_SHORT[loserMatch.phase] || loserMatch.phase) : '';
        text += `　敗者 → #${adv.loserNextId}（${loserLabel}）`;
      }
      advHtml = `<div class="bracket-flow">${text}</div>`;
    }
  }

  return `
    <div class="bracket-card">
      ${feedHtml}
      <div class="bracket-meta">
        <div>
          <span class="bracket-id">#${m.id}</span>
          <span class="bracket-date">📅 ${m.date}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${isFinished ? '<span style="font-size:12px;color:var(--green-bright);font-weight:700">終了</span>' : ''}
          <div class="match-broadcaster ${m.bcClass}">${m.bc}</div>
        </div>
      </div>
      <div class="bracket-teams">
        <div class="bracket-team ${t1Cls}">${m.t1}</div>
        <div class="bracket-score">
          ${isFinished
            ? `<div class="bracket-score-val">${m.score}</div>`
            : `<div class="bracket-score-val future">VS</div>`
          }
        </div>
        <div class="bracket-team ${t2Cls}">${m.t2}</div>
      </div>
      ${advHtml}
      ${m.youtube
        ? `<a href="${m.youtube}" target="_blank" rel="noopener" style="display:block;margin-top:12px;text-align:center;background:rgba(255,0,0,0.15);border:1px solid rgba(255,80,80,0.4);border-radius:8px;padding:7px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#FF8080;text-decoration:none;letter-spacing:0.5px">▶ ハイライトを見る</a>`
        : ''
      }
    </div>
  `;
}

function switchMatchPhase(phase) {
  currentMatchPhase = phase;
  document.querySelectorAll('.match-phase-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.phase === phase);
  });
  renderMatches();
}

function switchViewMode(mode) {
  currentViewMode = mode;
  document.querySelectorAll('.view-toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === mode);
  });
  renderMatches();
}

function showToast(msg, error=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => { t.classList.remove('show'); }, 3000);
}

// ====================================================
window.addEventListener('DOMContentLoaded', () => {
  renderMatches();          // マスターデータで即表示
  gasGet().then(renderMatches); // 最新スコア・対戦カードを取得して更新
});
</script>
</body>
</html>
